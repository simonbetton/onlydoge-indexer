services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-onlydoge}
      POSTGRES_USER: ${POSTGRES_USER:-onlydoge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-onlydoge}
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    volumes:
      - postgres_local:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-onlydoge}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-onlydoge123}
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio_local:/data

  minio-create-bucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -lc
      - |
        until mc alias set local http://minio:9000 "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}"; do
          sleep 1
        done
        mc mb --ignore-existing "local/${MINIO_BUCKET}"
        mc anonymous set none "local/${MINIO_BUCKET}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-onlydoge}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-onlydoge123}
      MINIO_BUCKET: ${MINIO_BUCKET:-onlydoge-raw}
    restart: 'no'

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-onlydoge}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-onlydoge}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-onlydoge}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - '${CLICKHOUSE_HTTP_PORT:-8123}:8123'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'clickhouse-client --user "$$CLICKHOUSE_USER" --password "$$CLICKHOUSE_PASSWORD" --query "SELECT 1" >/dev/null 2>&1',
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - clickhouse_local:/var/lib/clickhouse
      - ./docker/clickhouse/init/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

  onlydoge:
    build:
      context: .
      target: development
    command:
      - /bin/sh
      - -lc
      - bun install --frozen-lockfile && bun run --watch apps/onlydoge/src/index.ts --mode=both --ip=0.0.0.0 --port=2277
    depends_on:
      postgres:
        condition: service_healthy
      minio-create-bucket:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
    environment:
      ONLYDOGE_DATABASE: postgres://${POSTGRES_USER:-onlydoge}:${POSTGRES_PASSWORD:-onlydoge}@postgres:5432/${POSTGRES_DB:-onlydoge}
      ONLYDOGE_STORAGE: http://minio:9000/${MINIO_BUCKET:-onlydoge-raw}/${MINIO_PREFIX:-storage}
      ONLYDOGE_S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-onlydoge}
      ONLYDOGE_S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-onlydoge123}
      ONLYDOGE_WAREHOUSE: http://clickhouse:8123?database=${CLICKHOUSE_DB:-onlydoge}
      ONLYDOGE_WAREHOUSE_USER: ${CLICKHOUSE_USER:-onlydoge}
      ONLYDOGE_WAREHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-onlydoge}
    healthcheck:
      test:
        [
          'CMD',
          'bun',
          '-e',
          "const response = await fetch('http://127.0.0.1:2277/v1/heartbeat'); if (response.status !== 204) process.exit(1);",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    ports:
      - '${ONLYDOGE_HTTP_PORT:-2277}:2277'
    volumes:
      - .:/app
      - bun_node_modules:/app/node_modules
      - bun_install_cache:/root/.bun/install/cache

volumes:
  postgres_local:
  minio_local:
  clickhouse_local:
  bun_node_modules:
  bun_install_cache:
