services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    volumes:
      - postgres_prod:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_prod:/data

  minio-create-bucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -lc
      - |
        until mc alias set local http://minio:9000 "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}"; do
          sleep 1
        done
        mc mb --ignore-existing "local/${MINIO_BUCKET}"
        mc anonymous set none "local/${MINIO_BUCKET}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    restart: 'no'

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'clickhouse-client --user "$$CLICKHOUSE_USER" --password "$$CLICKHOUSE_PASSWORD" --query "SELECT 1" >/dev/null 2>&1',
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - clickhouse_prod:/var/lib/clickhouse
      - ./docker/clickhouse/init/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./docker/clickhouse/config.d/onlydoge-memory.xml:/etc/clickhouse-server/config.d/onlydoge-memory.xml:ro
      - ./docker/clickhouse/users.d/onlydoge-memory.xml:/etc/clickhouse-server/users.d/onlydoge-memory.xml:ro

  onlydoge-api:
    build:
      context: .
      target: production
    restart: unless-stopped
    command: ['--mode=http', '--ip=0.0.0.0', '--port=2277']
    depends_on:
      postgres:
        condition: service_healthy
      minio-create-bucket:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
    environment:
      ONLYDOGE_DATABASE: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ONLYDOGE_INDEXER_LEASE_HEARTBEAT_INTERVAL_MS: ${ONLYDOGE_INDEXER_LEASE_HEARTBEAT_INTERVAL_MS:-5000}
      ONLYDOGE_INDEXER_BOOTSTRAP_TIMEOUT_MS: ${ONLYDOGE_INDEXER_BOOTSTRAP_TIMEOUT_MS:-60000}
      ONLYDOGE_INDEXER_NETWORK_CONCURRENCY: ${ONLYDOGE_INDEXER_NETWORK_CONCURRENCY:-2}
      ONLYDOGE_INDEXER_DOGECOIN_TRANSFER_MAX_INPUT_ADDRESSES: ${ONLYDOGE_INDEXER_DOGECOIN_TRANSFER_MAX_INPUT_ADDRESSES:-64}
      ONLYDOGE_INDEXER_DOGECOIN_TRANSFER_MAX_EDGES: ${ONLYDOGE_INDEXER_DOGECOIN_TRANSFER_MAX_EDGES:-1024}
      ONLYDOGE_INDEXER_SYNC_BACKLOG_HIGH_WATERMARK: ${ONLYDOGE_INDEXER_SYNC_BACKLOG_HIGH_WATERMARK:-2048}
      ONLYDOGE_INDEXER_SYNC_BACKLOG_LOW_WATERMARK: ${ONLYDOGE_INDEXER_SYNC_BACKLOG_LOW_WATERMARK:-512}
      ONLYDOGE_INDEXER_SYNC_WINDOW: ${ONLYDOGE_INDEXER_SYNC_WINDOW:-32}
      ONLYDOGE_INDEXER_SYNC_WINDOW_MIN: ${ONLYDOGE_INDEXER_SYNC_WINDOW_MIN:-32}
      ONLYDOGE_INDEXER_SYNC_WINDOW_MAX: ${ONLYDOGE_INDEXER_SYNC_WINDOW_MAX:-256}
      ONLYDOGE_INDEXER_SYNC_CONCURRENCY: ${ONLYDOGE_INDEXER_SYNC_CONCURRENCY:-4}
      ONLYDOGE_INDEXER_SYNC_TARGET_MS: ${ONLYDOGE_INDEXER_SYNC_TARGET_MS:-15000}
      ONLYDOGE_INDEXER_SYNC_TIMEOUT_MS: ${ONLYDOGE_INDEXER_SYNC_TIMEOUT_MS:-120000}
      ONLYDOGE_INDEXER_FACT_WINDOW: ${ONLYDOGE_INDEXER_FACT_WINDOW:-64}
      ONLYDOGE_INDEXER_FACT_TIMEOUT_MS: ${ONLYDOGE_INDEXER_FACT_TIMEOUT_MS:-300000}
      ONLYDOGE_INDEXER_PROJECT_TARGET_MS: ${ONLYDOGE_INDEXER_PROJECT_TARGET_MS:-30000}
      ONLYDOGE_INDEXER_PROJECT_TIMEOUT_MS: ${ONLYDOGE_INDEXER_PROJECT_TIMEOUT_MS:-300000}
      ONLYDOGE_INDEXER_PROJECT_WINDOW_MAX: ${ONLYDOGE_INDEXER_PROJECT_WINDOW_MAX:-16}
      ONLYDOGE_INDEXER_PROJECT_WINDOW_MIN: ${ONLYDOGE_INDEXER_PROJECT_WINDOW_MIN:-2}
      ONLYDOGE_INDEXER_PROJECT_WINDOW: ${ONLYDOGE_INDEXER_PROJECT_WINDOW:-4}
      ONLYDOGE_INDEXER_RELINK_BACKLOG_THRESHOLD: ${ONLYDOGE_INDEXER_RELINK_BACKLOG_THRESHOLD:-256}
      ONLYDOGE_INDEXER_RELINK_TIP_DISTANCE: ${ONLYDOGE_INDEXER_RELINK_TIP_DISTANCE:-512}
      ONLYDOGE_INDEXER_RELINK_BATCH_SIZE: ${ONLYDOGE_INDEXER_RELINK_BATCH_SIZE:-16}
      ONLYDOGE_INDEXER_RELINK_CONCURRENCY: ${ONLYDOGE_INDEXER_RELINK_CONCURRENCY:-2}
      ONLYDOGE_INDEXER_RELINK_FRONTIER_BATCH: ${ONLYDOGE_INDEXER_RELINK_FRONTIER_BATCH:-32}
      ONLYDOGE_INDEXER_RELINK_TIMEOUT_MS: ${ONLYDOGE_INDEXER_RELINK_TIMEOUT_MS:-120000}
      ONLYDOGE_STORAGE: http://minio:9000/${MINIO_BUCKET}/${MINIO_PREFIX}
      ONLYDOGE_S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      ONLYDOGE_S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      ONLYDOGE_WAREHOUSE: http://clickhouse:8123?database=${CLICKHOUSE_DB}
      ONLYDOGE_WAREHOUSE_REQUEST_TIMEOUT_MS: ${ONLYDOGE_WAREHOUSE_REQUEST_TIMEOUT_MS:-30000}
      ONLYDOGE_WAREHOUSE_USER: ${CLICKHOUSE_USER}
      ONLYDOGE_WAREHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    healthcheck:
      test:
        [
          'CMD',
          'bun',
          '-e',
          "const response = await fetch('http://127.0.0.1:2277/v1/heartbeat'); if (response.status !== 204) process.exit(1);",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    ports:
      - '${ONLYDOGE_HTTP_PORT}:2277'

  onlydoge-indexer:
    build:
      context: .
      target: production
    restart: unless-stopped
    command: ['--mode=indexer']
    depends_on:
      postgres:
        condition: service_healthy
      minio-create-bucket:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
    environment:
      ONLYDOGE_DATABASE: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ONLYDOGE_INDEXER_LEASE_HEARTBEAT_INTERVAL_MS: ${ONLYDOGE_INDEXER_LEASE_HEARTBEAT_INTERVAL_MS:-5000}
      ONLYDOGE_INDEXER_BOOTSTRAP_TIMEOUT_MS: ${ONLYDOGE_INDEXER_BOOTSTRAP_TIMEOUT_MS:-60000}
      ONLYDOGE_INDEXER_NETWORK_CONCURRENCY: ${ONLYDOGE_INDEXER_NETWORK_CONCURRENCY:-2}
      ONLYDOGE_INDEXER_DOGECOIN_TRANSFER_MAX_INPUT_ADDRESSES: ${ONLYDOGE_INDEXER_DOGECOIN_TRANSFER_MAX_INPUT_ADDRESSES:-64}
      ONLYDOGE_INDEXER_DOGECOIN_TRANSFER_MAX_EDGES: ${ONLYDOGE_INDEXER_DOGECOIN_TRANSFER_MAX_EDGES:-1024}
      ONLYDOGE_INDEXER_SYNC_BACKLOG_HIGH_WATERMARK: ${ONLYDOGE_INDEXER_SYNC_BACKLOG_HIGH_WATERMARK:-2048}
      ONLYDOGE_INDEXER_SYNC_BACKLOG_LOW_WATERMARK: ${ONLYDOGE_INDEXER_SYNC_BACKLOG_LOW_WATERMARK:-512}
      ONLYDOGE_INDEXER_SYNC_WINDOW: ${ONLYDOGE_INDEXER_SYNC_WINDOW:-32}
      ONLYDOGE_INDEXER_SYNC_WINDOW_MIN: ${ONLYDOGE_INDEXER_SYNC_WINDOW_MIN:-32}
      ONLYDOGE_INDEXER_SYNC_WINDOW_MAX: ${ONLYDOGE_INDEXER_SYNC_WINDOW_MAX:-256}
      ONLYDOGE_INDEXER_SYNC_CONCURRENCY: ${ONLYDOGE_INDEXER_SYNC_CONCURRENCY:-4}
      ONLYDOGE_INDEXER_SYNC_TARGET_MS: ${ONLYDOGE_INDEXER_SYNC_TARGET_MS:-15000}
      ONLYDOGE_INDEXER_SYNC_TIMEOUT_MS: ${ONLYDOGE_INDEXER_SYNC_TIMEOUT_MS:-120000}
      ONLYDOGE_INDEXER_FACT_WINDOW: ${ONLYDOGE_INDEXER_FACT_WINDOW:-64}
      ONLYDOGE_INDEXER_FACT_TIMEOUT_MS: ${ONLYDOGE_INDEXER_FACT_TIMEOUT_MS:-300000}
      ONLYDOGE_INDEXER_PROJECT_TARGET_MS: ${ONLYDOGE_INDEXER_PROJECT_TARGET_MS:-30000}
      ONLYDOGE_INDEXER_PROJECT_TIMEOUT_MS: ${ONLYDOGE_INDEXER_PROJECT_TIMEOUT_MS:-300000}
      ONLYDOGE_INDEXER_PROJECT_WINDOW_MAX: ${ONLYDOGE_INDEXER_PROJECT_WINDOW_MAX:-16}
      ONLYDOGE_INDEXER_PROJECT_WINDOW_MIN: ${ONLYDOGE_INDEXER_PROJECT_WINDOW_MIN:-2}
      ONLYDOGE_INDEXER_PROJECT_WINDOW: ${ONLYDOGE_INDEXER_PROJECT_WINDOW:-4}
      ONLYDOGE_INDEXER_RELINK_BACKLOG_THRESHOLD: ${ONLYDOGE_INDEXER_RELINK_BACKLOG_THRESHOLD:-256}
      ONLYDOGE_INDEXER_RELINK_TIP_DISTANCE: ${ONLYDOGE_INDEXER_RELINK_TIP_DISTANCE:-512}
      ONLYDOGE_INDEXER_RELINK_BATCH_SIZE: ${ONLYDOGE_INDEXER_RELINK_BATCH_SIZE:-16}
      ONLYDOGE_INDEXER_RELINK_CONCURRENCY: ${ONLYDOGE_INDEXER_RELINK_CONCURRENCY:-2}
      ONLYDOGE_INDEXER_RELINK_FRONTIER_BATCH: ${ONLYDOGE_INDEXER_RELINK_FRONTIER_BATCH:-32}
      ONLYDOGE_INDEXER_RELINK_TIMEOUT_MS: ${ONLYDOGE_INDEXER_RELINK_TIMEOUT_MS:-120000}
      ONLYDOGE_STORAGE: http://minio:9000/${MINIO_BUCKET}/${MINIO_PREFIX}
      ONLYDOGE_S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      ONLYDOGE_S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      ONLYDOGE_WAREHOUSE: http://clickhouse:8123?database=${CLICKHOUSE_DB}
      ONLYDOGE_WAREHOUSE_REQUEST_TIMEOUT_MS: ${ONLYDOGE_WAREHOUSE_REQUEST_TIMEOUT_MS:-30000}
      ONLYDOGE_WAREHOUSE_USER: ${CLICKHOUSE_USER}
      ONLYDOGE_WAREHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}

volumes:
  postgres_prod:
  minio_prod:
  clickhouse_prod:
